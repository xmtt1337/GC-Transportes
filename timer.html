<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronômetro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      user-select: none;
      overflow: hidden;
    }

    .timer-display {
      display: flex;
      align-items: flex-end;
      gap: 0;
      cursor: pointer;
      transition: transform 0.05s;
    }

    .timer-display:active {
      transform: scale(0.98);
    }

    .time-main {
      font-size: clamp(80px, 18vw, 220px);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f59e0b;
      text-shadow:
        0 0 20px rgba(245, 158, 11, 0.6),
        0 0 60px rgba(245, 158, 11, 0.3);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .time-ms {
      font-size: clamp(36px, 7vw, 90px);
      font-weight: 700;
      color: #f59e0b;
      text-shadow:
        0 0 20px rgba(245, 158, 11, 0.6),
        0 0 60px rgba(245, 158, 11, 0.3);
      line-height: 1;
      padding-bottom: clamp(8px, 1.5vw, 18px);
      margin-left: 6px;
      font-variant-numeric: tabular-nums;
    }

    .status-label {
      margin-top: clamp(24px, 4vw, 48px);
      font-size: clamp(14px, 2vw, 22px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #6b7280;
      height: 28px;
      transition: color 0.2s;
    }

    .status-label.running {
      color: #22c55e;
      text-shadow: 0 0 12px rgba(34, 197, 94, 0.5);
    }

    .status-label.paused {
      color: #f59e0b;
      text-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
    }

    .hint {
      position: fixed;
      bottom: clamp(16px, 3vw, 36px);
      font-size: clamp(11px, 1.2vw, 15px);
      color: #374151;
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 1.8;
    }

    /* Pisca o display quando pausado */
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.35; }
    }

    .paused-blink {
      animation: blink 1s infinite;
    }
  </style>
</head>
<body>

  <div class="timer-display" id="timerDisplay">
    <span class="time-main" id="timeMain">00:00</span>
    <span class="time-ms" id="timeMs">.00</span>
  </div>

  <div class="status-label" id="statusLabel">Clique para iniciar</div>

  <div class="hint">
    1º clique: Iniciar &nbsp;·&nbsp; 2º clique: Pausar &nbsp;·&nbsp; 3º clique: Resetar
  </div>

  <script>
    const display  = document.getElementById('timerDisplay');
    const timeMain = document.getElementById('timeMain');
    const timeMs   = document.getElementById('timeMs');
    const statusLabel = document.getElementById('statusLabel');

    // Estados: 'idle' | 'running' | 'paused'
    let state     = 'idle';
    let startTime = 0;
    let elapsed   = 0;
    let rafId     = null;

    function pad(n, digits = 2) {
      return String(Math.floor(n)).padStart(digits, '0');
    }

    function render(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const mins = Math.floor(totalSecs / 60);
      const secs = totalSecs % 60;
      const cents = Math.floor((ms % 1000) / 10);

      timeMain.textContent = `${pad(mins)}:${pad(secs)}`;
      timeMs.textContent   = `.${pad(cents)}`;
    }

    function tick() {
      const now = performance.now();
      render(elapsed + (now - startTime));
      rafId = requestAnimationFrame(tick);
    }

    function start() {
      startTime = performance.now();
      rafId = requestAnimationFrame(tick);
      state = 'running';
      statusLabel.textContent = 'Rodando';
      statusLabel.className = 'status-label running';
      display.classList.remove('paused-blink');
    }

    function pause() {
      cancelAnimationFrame(rafId);
      elapsed += performance.now() - startTime;
      state = 'paused';
      statusLabel.textContent = 'Pausado';
      statusLabel.className = 'status-label paused';
      display.classList.add('paused-blink');
    }

    function reset() {
      cancelAnimationFrame(rafId);
      elapsed = 0;
      render(0);
      state = 'idle';
      statusLabel.textContent = 'Clique para iniciar';
      statusLabel.className = 'status-label';
      display.classList.remove('paused-blink');
    }

    display.addEventListener('click', () => {
      if (state === 'idle')    return start();
      if (state === 'running') return pause();
      if (state === 'paused')  return reset();
    });

    // Tecla Space também controla
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        display.click();
      }
    });

    render(0);
  </script>
</body>
</html>
